name: Spec drift

on:
  schedule:
    - cron: '0 6 * * 1' # weekly, Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Fetch the canonical spec
        run: |
          curl -fsSL https://docs.ship24.com/assets/openapi/ship24-tracking-api.yaml \
            -o spec/ship24-tracking-api.yaml
      - name: Open a PR if the vendored spec drifted
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: chore/spec-drift
          title: 'chore: sync vendored Ship24 OpenAPI spec'
          commit-message: 'chore: sync vendored Ship24 OpenAPI spec'
          labels: spec-drift
          body: |
            The canonical Ship24 OpenAPI spec differs from the vendored copy.

            Reviewer checklist:
            - [ ] `npm run generate` to refresh `src/generated/schema.d.ts` (drift reference)
            - [ ] review the diff and reconcile the hand-written types in `src/types/*`
            - [ ] update the resource facade if endpoints/params changed
            - [ ] add a changeset if the public surface changes
